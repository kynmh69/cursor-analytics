<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Team Usage Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f7776a;
    --accent3: #6af7c0;
    --accent4: #f7c46a;
    --text: #e8e8f0;
    --text-muted: #8888a8;
    --glow: rgba(124, 106, 247, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 600px 400px at 20% 20%, rgba(124,106,247,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 600px at 80% 80%, rgba(106,247,192,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px; }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area h1 {
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .logo-area p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-width: 220px;
  }
  .upload-zone:hover { border-color: var(--accent); background: var(--glow); }
  .upload-zone input { display: none; }
  .upload-zone .upload-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .upload-zone .upload-icon { font-size: 1.2rem; }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .kpi-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card:nth-child(1)::after { background: var(--accent); }
  .kpi-card:nth-child(2)::after { background: var(--accent2); }
  .kpi-card:nth-child(3)::after { background: var(--accent3); }
  .kpi-card:nth-child(4)::after { background: var(--accent4); }

  .kpi-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .kpi-card:nth-child(1) .kpi-value { color: var(--accent); }
  .kpi-card:nth-child(2) .kpi-value { color: var(--accent2); }
  .kpi-card:nth-child(3) .kpi-value { color: var(--accent3); }
  .kpi-card:nth-child(4) .kpi-value { color: var(--accent4); }

  .kpi-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Charts Grid */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: relative;
  }

  .chart-card.full-width { grid-column: span 2; }

  .chart-title {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .chart-wrap {
    position: relative;
    height: 280px;
  }

  /* User Table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 0 16px 16px;
    white-space: nowrap;
  }

  th:first-child { padding-left: 0; }

  tbody tr {
    border-bottom: 1px solid rgba(42, 42, 64, 0.5);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 14px 16px;
    font-size: 0.85rem;
  }

  td:first-child { padding-left: 0; }

  .user-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .cost-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cost-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    min-width: 80px;
  }

  .cost-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 1s ease;
  }

  .cost-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    min-width: 48px;
    text-align: right;
  }

  .mono { font-family: 'DM Mono', monospace; font-size: 0.82rem; }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  /* Loading state */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    color: var(--text-muted);
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.9);
    border: 3px dashed var(--accent);
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--accent);
  }

  #drop-overlay.active { display: flex; }

  /* Rank dot */
  .rank { 
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    width: 24px;
    text-align: center;
  }

  .top1 { color: var(--accent4); }
  .top2 { color: var(--text-muted); }
  .top3 { color: #cd7f32; }

  /* Responsive */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.full-width { grid-column: span 1; }
    header { flex-direction: column; gap: 20px; align-items: flex-start; }
    .logo-area h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div id="drop-overlay">📂 CSVをドロップして分析開始</div>

<div class="container">
  <header>
    <div class="logo-area">
      <h1>CURSOR ANALYTICS</h1>
      <p>チーム利用状況ダッシュボード</p>
    </div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="csvInput" accept=".csv">
      <label for="csvInput" class="upload-label">
        <span class="upload-icon">📁</span>
        <span>CSVを読み込む</span>
      </label>
    </div>
  </header>

  <div id="dashboard" style="display:none">
    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card full-width">
        <div class="chart-title">日別コスト推移 (ユーザー別)</div>
        <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">モデル別コスト</div>
        <div class="chart-wrap"><canvas id="modelChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">ユーザー別リクエスト数</div>
        <div class="chart-wrap"><canvas id="requestChart"></canvas></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="chart-title" style="margin-bottom:20px">メンバー別詳細レポート</div>
      <table id="userTable"></table>
    </div>
  </div>

  <div id="placeholder" class="loading">
    <div style="font-size:3rem">📊</div>
    <div style="font-size:1rem; font-weight:700;">Cursor Team Usage CSV をアップロード</div>
    <p style="font-size:0.8rem; max-width:300px; text-align:center; line-height:1.6;">ページにCSVをドラッグ&ドロップ、またはヘッダーの「CSVを読み込む」ボタンをクリックしてください</p>
  </div>
</div>

<script>
const COLORS = [
  '#7c6af7','#f7776a','#6af7c0','#f7c46a','#f76af7',
  '#6ab5f7','#c06af7','#f7f76a','#6af78c','#f7a16a'
];

const AVATAR_COLORS = [
  ['#7c6af7','#1a1535'],['#f7776a','#35150f'],['#6af7c0','#0f3528'],
  ['#f7c46a','#35280f'],['#f76af7','#35103e'],['#6ab5f7','#0f2735'],
  ['#c06af7','#2a1035'],['#f7f76a','#35350f']
];

let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function shortEmail(email) {
  const name = email.split('@')[0];
  const parts = name.split('.');
  if (parts.length >= 2) {
    return parts[0].charAt(0).toUpperCase() + parts[0].slice(1) + ' ' + parts[1].charAt(0).toUpperCase() + '.';
  }
  return name;
}

function initials(email) {
  const name = email.split('@')[0].split('.');
  return (name[0]?.[0] || '').toUpperCase() + (name[1]?.[0] || '').toUpperCase();
}

function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

function processData(rows) {
  const valid = rows.filter(r => r['Kind'] === 'Included');
  
  // Per user
  const userMap = {};
  valid.forEach(r => {
    const u = r['User'];
    if (!userMap[u]) userMap[u] = { cost: 0, req: 0, tokens: 0, input: 0, output: 0, cacheRead: 0, models: {} };
    const s = userMap[u];
    s.cost += parseFloat(r['Cost']) || 0;
    s.req++;
    s.tokens += parseInt(r['Total Tokens']) || 0;
    s.input += parseInt(r['Input (w/o Cache Write)']) || 0;
    s.output += parseInt(r['Output Tokens']) || 0;
    s.cacheRead += parseInt(r['Cache Read']) || 0;
    const m = r['Model'];
    s.models[m] = (s.models[m] || 0) + 1;
  });

  // Daily per user
  const dailyMap = {};
  valid.forEach(r => {
    const date = r['Date'].substring(0, 10);
    if (!dailyMap[date]) dailyMap[date] = {};
    dailyMap[date][r['User']] = (dailyMap[date][r['User']] || 0) + (parseFloat(r['Cost']) || 0);
  });

  // Model totals
  const modelMap = {};
  valid.forEach(r => {
    const m = r['Model'];
    if (!modelMap[m]) modelMap[m] = { cost: 0, req: 0 };
    modelMap[m].cost += parseFloat(r['Cost']) || 0;
    modelMap[m].req++;
  });

  const users = Object.entries(userMap).sort((a, b) => b[1].cost - a[1].cost);
  const dates = Object.keys(dailyMap).sort();
  const totalCost = users.reduce((s, [,v]) => s + v.cost, 0);
  const totalReq = valid.length;
  const totalTokens = users.reduce((s, [,v]) => s + v.tokens, 0);

  return { users, dailyMap, modelMap, dates, totalCost, totalReq, totalTokens };
}

function renderKPIs({ users, totalCost, totalReq, totalTokens }) {
  const topUser = users[0];
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">💰 総コスト</div>
      <div class="kpi-value">$${totalCost.toFixed(2)}</div>
      <div class="kpi-sub">期間合計</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🔥 最多使用者</div>
      <div class="kpi-value" style="font-size:1.6rem">${shortEmail(topUser[0])}</div>
      <div class="kpi-sub">$${topUser[1].cost.toFixed(2)} / ${topUser[1].req} req</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">📡 総リクエスト</div>
      <div class="kpi-value">${totalReq.toLocaleString()}</div>
      <div class="kpi-sub">${users.length} ユーザー</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🧠 総トークン</div>
      <div class="kpi-value">${fmtNum(totalTokens)}</div>
      <div class="kpi-sub">入力 + キャッシュ + 出力</div>
    </div>
  `;
}

function chartDefaults() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          color: '#8888a8',
          font: { family: 'DM Mono', size: 11 },
          boxWidth: 10,
          padding: 16
        }
      }
    }
  };
}

function renderDailyChart({ users, dailyMap, dates }) {
  const ctx = document.getElementById('dailyChart').getContext('2d');
  const topUsers = users.slice(0, 8).map(([u]) => u);

  const datasets = topUsers.map((u, i) => ({
    label: shortEmail(u),
    data: dates.map(d => parseFloat((dailyMap[d]?.[u] || 0).toFixed(3))),
    backgroundColor: COLORS[i] + '80',
    borderColor: COLORS[i],
    borderWidth: 2,
    fill: true,
    tension: 0.4,
    pointRadius: 4,
    pointHoverRadius: 6,
  }));

  charts.daily = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      ...chartDefaults(),
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          ticks: { color: '#8888a8', font: { family: 'DM Mono', size: 10 } },
          grid: { color: '#2a2a40' }
        },
        y: {
          ticks: { color: '#8888a8', font: { family: 'DM Mono', size: 10 }, callback: v => '$' + v.toFixed(2) },
          grid: { color: '#2a2a40' },
          stacked: false
        }
      },
      plugins: {
        ...chartDefaults().plugins,
        tooltip: {
          backgroundColor: '#12121a',
          borderColor: '#2a2a40',
          borderWidth: 1,
          titleColor: '#e8e8f0',
          bodyColor: '#8888a8',
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(3)}`
          }
        }
      }
    }
  });
}

function renderModelChart({ modelMap }) {
  const ctx = document.getElementById('modelChart').getContext('2d');
  const sorted = Object.entries(modelMap).sort((a,b) => b[1].cost - a[1].cost).filter(([,v]) => v.cost > 0);

  charts.model = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([m]) => m),
      datasets: [{
        data: sorted.map(([,v]) => parseFloat(v.cost.toFixed(3))),
        backgroundColor: sorted.map((_, i) => COLORS[i % COLORS.length] + 'cc'),
        borderColor: sorted.map((_, i) => COLORS[i % COLORS.length]),
        borderWidth: 2,
        hoverOffset: 8
      }]
    },
    options: {
      ...chartDefaults(),
      cutout: '62%',
      plugins: {
        ...chartDefaults().plugins,
        tooltip: {
          backgroundColor: '#12121a',
          borderColor: '#2a2a40',
          borderWidth: 1,
          callbacks: {
            label: ctx => ` $${ctx.parsed.toFixed(3)} (${ctx.raw} / ${ctx.dataset.data.reduce((a,b)=>a+b,0).toFixed(2)} total)`
          }
        }
      }
    }
  });
}

function renderRequestChart({ users }) {
  const ctx = document.getElementById('requestChart').getContext('2d');
  const sorted = [...users].sort((a,b) => b[1].req - a[1].req).slice(0,10);

  charts.req = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(([u]) => shortEmail(u)),
      datasets: [{
        label: 'リクエスト数',
        data: sorted.map(([,v]) => v.req),
        backgroundColor: sorted.map((_, i) => COLORS[i % COLORS.length] + '99'),
        borderColor: sorted.map((_, i) => COLORS[i % COLORS.length]),
        borderWidth: 2,
        borderRadius: 6,
      }]
    },
    options: {
      ...chartDefaults(),
      indexAxis: 'y',
      scales: {
        x: {
          ticks: { color: '#8888a8', font: { family: 'DM Mono', size: 10 } },
          grid: { color: '#2a2a40' }
        },
        y: {
          ticks: { color: '#e8e8f0', font: { family: 'DM Mono', size: 10 } },
          grid: { color: 'transparent' }
        }
      },
      plugins: {
        ...chartDefaults().plugins,
        tooltip: {
          backgroundColor: '#12121a',
          borderColor: '#2a2a40',
          borderWidth: 1,
          callbacks: { label: ctx => ` ${ctx.parsed.x} リクエスト` }
        }
      }
    }
  });
}

function renderTable({ users }) {
  const maxCost = Math.max(...users.map(([,v]) => v.cost));
  const rankEmoji = ['🥇','🥈','🥉'];

  const rows = users.map(([u, s], i) => {
    const [bgColor, textColor] = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const topModel = Object.entries(s.models).sort((a,b)=>b[1]-a[1])[0]?.[0] || '-';
    const pct = ((s.cost / maxCost) * 100).toFixed(0);
    const cacheRatio = s.tokens > 0 ? ((s.cacheRead / s.tokens) * 100).toFixed(0) : 0;

    return `<tr>
      <td><span class="rank ${i<3?'top'+(i+1):''}">${rankEmoji[i] || (i+1)}</span></td>
      <td>
        <div class="user-name">
          <div class="avatar" style="background:${bgColor};color:${textColor}">${initials(u)}</div>
          <div>
            <div style="font-weight:600;font-size:0.85rem">${shortEmail(u)}</div>
            <div style="font-size:0.68rem;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:2px">${u}</div>
          </div>
        </div>
      </td>
      <td>
        <div class="cost-bar-wrap">
          <div class="cost-bar"><div class="cost-bar-fill" style="width:${pct}%"></div></div>
          <div class="cost-val" style="color:${COLORS[i%COLORS.length]}">$${s.cost.toFixed(2)}</div>
        </div>
      </td>
      <td class="mono">${s.req.toLocaleString()}</td>
      <td class="mono">${fmtNum(s.tokens)}</td>
      <td class="mono">${fmtNum(s.output)}</td>
      <td>
        <span style="color:var(--accent3);font-family:'DM Mono',monospace;font-size:0.75rem">${cacheRatio}%</span>
      </td>
      <td>
        <span class="badge" style="background:rgba(124,106,247,0.15);color:var(--accent);border:1px solid rgba(124,106,247,0.3)">${topModel}</span>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('userTable').innerHTML = `
    <thead>
      <tr>
        <th>#</th>
        <th>メンバー</th>
        <th>コスト</th>
        <th>リクエスト</th>
        <th>総トークン</th>
        <th>出力トークン</th>
        <th>キャッシュ率</th>
        <th>主要モデル</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  `;
}

function analyze(csvText) {
  Papa.parse(csvText, {
    header: true,
    skipEmptyLines: true,
    complete: ({ data }) => {
      destroyCharts();
      const stats = processData(data);
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderKPIs(stats);
      renderDailyChart(stats);
      renderModelChart(stats);
      renderRequestChart(stats);
      renderTable(stats);
    }
  });
}

// File input
document.getElementById('csvInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  f.text().then(analyze);
});

// Drag & drop
document.addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.add('active');
});
document.addEventListener('dragleave', e => {
  if (e.relatedTarget === null) document.getElementById('drop-overlay').classList.remove('active');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f) f.text().then(analyze);
});
