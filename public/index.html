<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Team Usage Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #08080c;
    --bg2: #0d0d14;
    --surface: rgba(255, 255, 255, 0.025);
    --surface-hover: rgba(255, 255, 255, 0.045);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --accent: #8b7cff;
    --accent2: #ff7eb6;
    --accent3: #5ce1b6;
    --accent4: #ffd166;
    --text: #f4f4fa;
    --text-muted: #9a9ab5;
    --text-dim: #63637a;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient aurora background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(60vw 50vh at 12% -5%, rgba(139,124,255,0.16), transparent 60%),
      radial-gradient(50vw 45vh at 95% 0%, rgba(255,126,182,0.10), transparent 55%),
      radial-gradient(55vw 55vh at 80% 100%, rgba(92,225,182,0.08), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  /* Subtle grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 44px 28px 80px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .logo-area { display: flex; align-items: center; gap: 16px; }

  .logo-mark {
    width: 46px; height: 46px;
    border-radius: 13px;
    background: linear-gradient(140deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 28px rgba(139,124,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    flex-shrink: 0;
  }
  .logo-mark svg { width: 24px; height: 24px; }

  .logo-area h1 {
    font-family: var(--display);
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .logo-area p {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .header-actions { display: flex; align-items: center; gap: 12px; }

  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 0.72rem;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 9px 14px; border-radius: 10px;
  }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }

  .btn-upload {
    position: relative;
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 0.82rem; font-weight: 600;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    padding: 10px 16px; border-radius: 11px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .btn-upload:hover { background: var(--surface-hover); border-color: var(--accent); transform: translateY(-1px); }
  .btn-upload input { display: none; }
  .btn-upload svg { width: 16px; height: 16px; opacity: 0.85; }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 22px;
  }

  .kpi-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 24px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
  }
  .kpi-card:hover { transform: translateY(-3px); border-color: var(--border-strong); box-shadow: 0 16px 40px rgba(0,0,0,0.45); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: -40%; right: -20%;
    width: 160px; height: 160px;
    border-radius: 50%;
    opacity: 0.14;
    filter: blur(28px);
  }
  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--accent2); }
  .kpi-card:nth-child(3)::before { background: var(--accent3); }
  .kpi-card:nth-child(4)::before { background: var(--accent4); }

  .kpi-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .kpi-icon {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .kpi-card:nth-child(1) .kpi-icon { background: rgba(139,124,255,0.14); }
  .kpi-card:nth-child(2) .kpi-icon { background: rgba(255,126,182,0.14); }
  .kpi-card:nth-child(3) .kpi-icon { background: rgba(92,225,182,0.14); }
  .kpi-card:nth-child(4) .kpi-icon { background: rgba(255,209,102,0.14); }
  .kpi-label {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .kpi-value {
    font-family: var(--display);
    font-size: 2.3rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .kpi-value.small { font-size: 1.45rem; }
  .kpi-card:nth-child(1) .kpi-value { color: #b3a8ff; }
  .kpi-card:nth-child(2) .kpi-value { color: #ffa8cf; }
  .kpi-card:nth-child(3) .kpi-value { color: #8ceccf; }
  .kpi-card:nth-child(4) .kpi-value { color: #ffe0a0; }
  .kpi-sub {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 9px;
  }

  /* Charts Grid */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 18px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px 28px;
    backdrop-filter: blur(12px);
  }
  .card.full-width { grid-column: span 2; }

  .card-title {
    font-family: var(--display);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .card-title .accent-bar {
    width: 4px; height: 15px; border-radius: 2px;
    background: linear-gradient(var(--accent), var(--accent2));
  }
  .card-sub {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-dim);
    margin: 0 0 20px 13px;
  }

  .chart-wrap { position: relative; height: 300px; }
  .card:not(.full-width) .chart-wrap { height: 280px; }

  /* Table */
  .table-card { margin-bottom: 18px; overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 720px; }

  thead th {
    font-family: var(--mono);
    font-size: 0.66rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    padding: 0 16px 14px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { padding-left: 4px; }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface-hover); }

  td { padding: 15px 16px; font-size: 0.86rem; }
  td:first-child { padding-left: 4px; }

  .user-name { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.76rem; font-weight: 700; flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .u-display { font-weight: 600; font-size: 0.87rem; }
  .u-email { font-size: 0.68rem; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }

  .cost-bar-wrap { display: flex; align-items: center; gap: 12px; min-width: 150px; }
  .cost-bar { flex: 1; height: 7px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; min-width: 70px; }
  .cost-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent3)); transition: width 1s cubic-bezier(0.22,1,0.36,1); }
  .cost-val { font-family: var(--mono); font-size: 0.82rem; font-weight: 500; min-width: 52px; text-align: right; }

  .mono { font-family: var(--mono); font-size: 0.82rem; color: var(--text-muted); }

  .badge {
    display: inline-block;
    padding: 4px 10px; border-radius: 7px;
    font-size: 0.68rem; font-family: var(--mono); font-weight: 500;
    background: rgba(139,124,255,0.12);
    color: #b3a8ff;
    border: 1px solid rgba(139,124,255,0.22);
    white-space: nowrap;
  }
  .cache-chip { color: var(--accent3); font-family: var(--mono); font-size: 0.78rem; font-weight: 500; }

  .rank {
    font-family: var(--display);
    font-size: 0.9rem; font-weight: 700;
    color: var(--text-dim);
    width: 26px; display: inline-block; text-align: center;
  }
  .rank.medal { font-size: 1.1rem; }

  /* Placeholder / loading */
  .placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 420px; gap: 18px; text-align: center;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: 20px;
  }
  .placeholder .big { font-size: 2.6rem; opacity: 0.9; }
  .placeholder h2 { font-family: var(--display); font-size: 1.1rem; font-weight: 600; }
  .placeholder p { font-size: 0.82rem; color: var(--text-muted); max-width: 340px; line-height: 1.7; }
  .spinner {
    width: 38px; height: 38px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade-in { animation: fade 0.5s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Drop overlay */
  #drop-overlay {
    display: none; position: fixed; inset: 16px;
    background: rgba(8,8,12,0.86);
    backdrop-filter: blur(6px);
    border: 2px dashed var(--accent);
    border-radius: 24px;
    z-index: 100;
    align-items: center; justify-content: center;
    font-family: var(--display); font-size: 1.4rem; color: var(--text);
    gap: 14px;
  }
  #drop-overlay.active { display: flex; }

  @media (max-width: 920px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .card.full-width { grid-column: span 1; }
    .logo-area h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div id="drop-overlay"><span>📂</span><span>CSVをドロップして読み込み</span></div>

<div class="container">
  <header>
    <div class="logo-area">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 19V9M9.5 19V5M15 19v-7M20.5 19v-4" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Cursor Analytics</h1>
        <p>Team Usage Dashboard</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="pill" id="rangePill" style="display:none"><span class="dot"></span><span id="rangeText"></span></span>
      <label class="btn-upload">
        <input type="file" id="csvInput" accept=".csv">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 16V4m0 0L7 9m5-5l5 5M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>CSVを読み込む</span>
      </label>
    </div>
  </header>

  <div id="dashboard" style="display:none">
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="charts-grid">
      <div class="card full-width">
        <div class="card-title"><span class="accent-bar"></span>日別コスト推移</div>
        <div class="card-sub">ユーザー別 / 上位8名</div>
        <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="accent-bar"></span>モデル別コスト</div>
        <div class="card-sub">コスト構成比</div>
        <div class="chart-wrap"><canvas id="modelChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="accent-bar"></span>ユーザー別リクエスト数</div>
        <div class="card-sub">上位10名</div>
        <div class="chart-wrap"><canvas id="requestChart"></canvas></div>
      </div>
    </div>

    <div class="card table-card">
      <div class="card-title" style="margin-bottom:20px"><span class="accent-bar"></span>メンバー別詳細レポート</div>
      <table id="userTable"></table>
    </div>
  </div>

  <div id="placeholder" class="placeholder">
    <div class="big">📊</div>
    <h2>Cursor Team Usage CSV をアップロード</h2>
    <p>ページにCSVをドラッグ&ドロップ、または「CSVを読み込む」ボタンから選択してください</p>
  </div>
</div>

<script>
const COLORS = [
  '#8b7cff','#ff7eb6','#5ce1b6','#ffd166','#f78bff',
  '#6ab5f7','#c06af7','#f7f76a','#6af78c','#f7a16a'
];

const AVATAR_COLORS = [
  ['#8b7cff','#1b1640'],['#ff7eb6','#3a1024'],['#5ce1b6','#0d3328'],
  ['#ffd166','#332708'],['#f78bff','#340f38'],['#6ab5f7','#0d2738'],
  ['#c06af7','#280f38'],['#f7c46a','#332708']
];

const EXCLUDED_KINDS = new Set(['Aborted, Not Charged', 'Errored, No Charge']);

let charts = {};
function destroyCharts() { Object.values(charts).forEach(c => c && c.destroy()); charts = {}; }

function shortEmail(email) {
  const name = (email || '').split('@')[0];
  const parts = name.split('.');
  if (parts.length >= 2) {
    return parts[0].charAt(0).toUpperCase() + parts[0].slice(1) + ' ' + parts[1].charAt(0).toUpperCase() + '.';
  }
  return name;
}
function initials(email) {
  const name = (email || '').split('@')[0].split('.');
  return (name[0]?.[0] || '').toUpperCase() + (name[1]?.[0] || '').toUpperCase();
}
function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(Math.round(n));
}
function toCost(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}
function toInt(v) {
  const n = parseInt(v, 10);
  return isNaN(n) ? 0 : n;
}

function processData(rows) {
  const valid = rows.filter(r => r['User'] && !EXCLUDED_KINDS.has((r['Kind'] || '').trim()));

  const userMap = {};
  valid.forEach(r => {
    const u = r['User'];
    if (!userMap[u]) userMap[u] = { cost: 0, req: 0, tokens: 0, input: 0, output: 0, cacheRead: 0, models: {} };
    const s = userMap[u];
    s.cost += toCost(r['Cost']);
    s.req++;
    s.tokens += toInt(r['Total Tokens']);
    s.input += toInt(r['Input (w/o Cache Write)']);
    s.output += toInt(r['Output Tokens']);
    s.cacheRead += toInt(r['Cache Read']);
    const m = r['Model'] || '不明';
    s.models[m] = (s.models[m] || 0) + 1;
  });

  const dailyMap = {};
  valid.forEach(r => {
    const date = (r['Date'] || '').substring(0, 10);
    if (!date) return;
    if (!dailyMap[date]) dailyMap[date] = {};
    dailyMap[date][r['User']] = (dailyMap[date][r['User']] || 0) + toCost(r['Cost']);
  });

  const modelMap = {};
  valid.forEach(r => {
    const m = r['Model'] || '不明';
    if (!modelMap[m]) modelMap[m] = { cost: 0, req: 0 };
    modelMap[m].cost += toCost(r['Cost']);
    modelMap[m].req++;
  });

  const users = Object.entries(userMap).sort((a, b) => b[1].cost - a[1].cost);
  const dates = Object.keys(dailyMap).sort();
  const totalCost = users.reduce((s, [, v]) => s + v.cost, 0);
  const totalReq = valid.length;
  const totalTokens = users.reduce((s, [, v]) => s + v.tokens, 0);

  return { users, dailyMap, modelMap, dates, totalCost, totalReq, totalTokens };
}

function renderRange(dates) {
  const pill = document.getElementById('rangePill');
  const el = document.getElementById('rangeText');
  if (!dates.length) { pill.style.display = 'none'; return; }
  el.textContent = `${dates[0]} → ${dates[dates.length - 1]}`;
  pill.style.display = 'inline-flex';
}

function renderKPIs({ users, totalCost, totalReq, totalTokens }) {
  const topUser = users[0] || ['-', { cost: 0, req: 0 }];
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card fade-in">
      <div class="kpi-head"><div class="kpi-icon">💰</div><div class="kpi-label">総コスト</div></div>
      <div class="kpi-value">$${totalCost.toFixed(2)}</div>
      <div class="kpi-sub">期間合計</div>
    </div>
    <div class="kpi-card fade-in">
      <div class="kpi-head"><div class="kpi-icon">🔥</div><div class="kpi-label">最多使用者</div></div>
      <div class="kpi-value small">${shortEmail(topUser[0])}</div>
      <div class="kpi-sub">$${topUser[1].cost.toFixed(2)} · ${topUser[1].req.toLocaleString()} req</div>
    </div>
    <div class="kpi-card fade-in">
      <div class="kpi-head"><div class="kpi-icon">📡</div><div class="kpi-label">総リクエスト</div></div>
      <div class="kpi-value">${totalReq.toLocaleString()}</div>
      <div class="kpi-sub">${users.length} ユーザー</div>
    </div>
    <div class="kpi-card fade-in">
      <div class="kpi-head"><div class="kpi-icon">🧠</div><div class="kpi-label">総トークン</div></div>
      <div class="kpi-value">${fmtNum(totalTokens)}</div>
      <div class="kpi-sub">入力 + キャッシュ + 出力</div>
    </div>
  `;
}

function chartDefaults() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          color: '#9a9ab5',
          font: { family: 'JetBrains Mono', size: 11 },
          boxWidth: 10, boxHeight: 10, usePointStyle: true, padding: 16
        }
      }
    }
  };
}
const TOOLTIP = {
  backgroundColor: 'rgba(13,13,20,0.95)',
  borderColor: 'rgba(255,255,255,0.12)',
  borderWidth: 1,
  titleColor: '#f4f4fa',
  bodyColor: '#9a9ab5',
  padding: 12, cornerRadius: 10, titleFont: { family: 'Inter', weight: '600' }, bodyFont: { family: 'JetBrains Mono' }
};
const GRID = 'rgba(255,255,255,0.05)';
const TICK = { color: '#63637a', font: { family: 'JetBrains Mono', size: 10 } };

function renderDailyChart({ users, dailyMap, dates }) {
  const ctx = document.getElementById('dailyChart').getContext('2d');
  const topUsers = users.slice(0, 8).map(([u]) => u);
  const datasets = topUsers.map((u, i) => {
    const grad = ctx.createLinearGradient(0, 0, 0, 300);
    grad.addColorStop(0, COLORS[i] + '55');
    grad.addColorStop(1, COLORS[i] + '00');
    return {
      label: shortEmail(u),
      data: dates.map(d => parseFloat((dailyMap[d]?.[u] || 0).toFixed(3))),
      backgroundColor: grad,
      borderColor: COLORS[i],
      borderWidth: 2, fill: true, tension: 0.4,
      pointRadius: 0, pointHoverRadius: 5, pointBackgroundColor: COLORS[i]
    };
  });
  charts.daily = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      ...chartDefaults(),
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { ticks: TICK, grid: { color: GRID }, border: { display: false } },
        y: { ticks: { ...TICK, callback: v => '$' + v.toFixed(2) }, grid: { color: GRID }, border: { display: false } }
      },
      plugins: {
        ...chartDefaults().plugins,
        tooltip: { ...TOOLTIP, callbacks: { label: c => ` ${c.dataset.label}: $${c.parsed.y.toFixed(3)}` } }
      }
    }
  });
}

function renderModelChart({ modelMap }) {
  const ctx = document.getElementById('modelChart').getContext('2d');
  const sorted = Object.entries(modelMap).sort((a, b) => b[1].cost - a[1].cost).filter(([, v]) => v.cost > 0);
  const total = sorted.reduce((s, [, v]) => s + v.cost, 0);
  charts.model = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([m]) => m),
      datasets: [{
        data: sorted.map(([, v]) => parseFloat(v.cost.toFixed(3))),
        backgroundColor: sorted.map((_, i) => COLORS[i % COLORS.length] + 'dd'),
        borderColor: 'rgba(8,8,12,0.6)', borderWidth: 2, hoverOffset: 10
      }]
    },
    options: {
      ...chartDefaults(),
      cutout: '64%',
      plugins: {
        ...chartDefaults().plugins,
        tooltip: { ...TOOLTIP, callbacks: {
          label: c => ` $${c.parsed.toFixed(3)} (${total ? (c.parsed / total * 100).toFixed(1) : 0}%)`
        } }
      }
    }
  });
}

function renderRequestChart({ users }) {
  const ctx = document.getElementById('requestChart').getContext('2d');
  const sorted = [...users].sort((a, b) => b[1].req - a[1].req).slice(0, 10);
  charts.req = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(([u]) => shortEmail(u)),
      datasets: [{
        label: 'リクエスト数',
        data: sorted.map(([, v]) => v.req),
        backgroundColor: sorted.map((_, i) => COLORS[i % COLORS.length] + 'cc'),
        borderColor: sorted.map((_, i) => COLORS[i % COLORS.length]),
        borderWidth: 0, borderRadius: 7, barThickness: 'flex', maxBarThickness: 22
      }]
    },
    options: {
      ...chartDefaults(),
      indexAxis: 'y',
      plugins: {
        ...chartDefaults().plugins,
        legend: { display: false },
        tooltip: { ...TOOLTIP, callbacks: { label: c => ` ${c.parsed.x.toLocaleString()} リクエスト` } }
      },
      scales: {
        x: { ticks: TICK, grid: { color: GRID }, border: { display: false } },
        y: { ticks: { color: '#c8c8dd', font: { family: 'JetBrains Mono', size: 10 } }, grid: { display: false }, border: { display: false } }
      }
    }
  });
}

function renderTable({ users }) {
  const maxCost = Math.max(1e-9, ...users.map(([, v]) => v.cost));
  const medals = ['🥇', '🥈', '🥉'];
  const rows = users.map(([u, s], i) => {
    const [bg, fg] = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const topModel = Object.entries(s.models).sort((a, b) => b[1] - a[1])[0]?.[0] || '-';
    const pct = ((s.cost / maxCost) * 100).toFixed(0);
    const cacheRatio = s.tokens > 0 ? ((s.cacheRead / s.tokens) * 100).toFixed(0) : 0;
    return `<tr class="fade-in">
      <td><span class="rank ${i < 3 ? 'medal' : ''}">${medals[i] || (i + 1)}</span></td>
      <td>
        <div class="user-name">
          <div class="avatar" style="background:${bg};color:${fg}">${initials(u)}</div>
          <div><div class="u-display">${shortEmail(u)}</div><div class="u-email">${u}</div></div>
        </div>
      </td>
      <td>
        <div class="cost-bar-wrap">
          <div class="cost-bar"><div class="cost-bar-fill" style="width:${pct}%"></div></div>
          <div class="cost-val" style="color:${COLORS[i % COLORS.length]}">$${s.cost.toFixed(2)}</div>
        </div>
      </td>
      <td class="mono">${s.req.toLocaleString()}</td>
      <td class="mono">${fmtNum(s.tokens)}</td>
      <td class="mono">${fmtNum(s.output)}</td>
      <td><span class="cache-chip">${cacheRatio}%</span></td>
      <td><span class="badge">${topModel}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('userTable').innerHTML = `
    <thead><tr>
      <th>#</th><th>メンバー</th><th>コスト</th><th>リクエスト</th>
      <th>総トークン</th><th>出力トークン</th><th>キャッシュ率</th><th>主要モデル</th>
    </tr></thead>
    <tbody>${rows}</tbody>`;
}

function showDashboard() {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}
function showEmpty(msg) {
  document.getElementById('dashboard').style.display = 'none';
  const p = document.getElementById('placeholder');
  p.style.display = 'flex';
  p.innerHTML = `<div class="big">📊</div><h2>${msg || 'Cursor Team Usage CSV をアップロード'}</h2>
    <p>ページにCSVをドラッグ&ドロップ、または「CSVを読み込む」ボタンから選択してください</p>`;
}

function analyze(csvText) {
  Papa.parse(csvText, {
    header: true, skipEmptyLines: true,
    complete: ({ data }) => {
      const stats = processData(data);
      if (!stats.users.length) { showEmpty('有効なデータが見つかりませんでした'); return; }
      destroyCharts();
      showDashboard();
      renderRange(stats.dates);
      renderKPIs(stats);
      renderDailyChart(stats);
      renderModelChart(stats);
      renderRequestChart(stats);
      renderTable(stats);
    }
  });
}

document.getElementById('csvInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) f.text().then(analyze);
});

document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('active'); });
document.addEventListener('dragleave', e => { if (e.relatedTarget === null) document.getElementById('drop-overlay').classList.remove('active'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f) f.text().then(analyze);
});

</script>

</body>
</html>
